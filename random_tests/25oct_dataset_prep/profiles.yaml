# =============================================================================
# SIMPLE EXPORT CONFIG - Copy files preserving tree structure
# =============================================================================

profiles:
  default:
    # Files to always copy
    includes:
      - "videos/**"
      - "df_*_label3d_dannce.mat"
      - "folder_log.parquet"
      # Only for mini sessions (ignored if not present)
      - "MIR_Aligned/frame_mapping.json"
      # - "MIR_Aligned/overlay*.png"
      # - "*.txt"
      # DANNCE prediction placeholders - update as needed in future
      # - "DANNCE/predict*/save_data_AVG.mat"
      # - "DANNCE/predict*/com3d_used*.mat"

    
    # Files to skip
    excludes:
      - "**/vis/**"
      - "MIR_Aligned/*.h5"
      - "COM/**"
      - "prev_calib/**"
      - "prev_intrinsic_calib/**"

    
    # Miniscope video handling (uncomment when needed)
    # mini:
    #   dest_subdir: "MyV4Miniscope"
    
    # Cleanup: Remove old predictions before exporting new ones
    cleanup:
      enabled: true
      mode: trash                    # Moves to .trash/ instead of deleting
      trash_dir: ".trash"
      respect_dry_run: true
      
      # What folders cleanup can touch (predictions/processing only)
      scope:
        - "**/metadata/*.png"
        # - "**/DANNCE/**"
        # - "*.txt"
        # # - "**/*.txt"
        # - "**/prev_intrinsic_calib/**"
      
      # What cleanup must NEVER touch (raw data is sacred)
      protect:
        - "videos/**"
        - "df_*_label3d_dannce.mat"
        # Only for mini sessions (protected even if present)
        - "MIR_Aligned/frame_mapping.json"
        - "MIR_Aligned/overlay*.png"
        